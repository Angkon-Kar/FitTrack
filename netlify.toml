[build]
command = "bash build.sh"
publish = "dist"

[functions]
directory = "api"

[[redirects]]
from = "/api/send-report"
to = "/.netlify/functions/send-report"
status = 200

[[redirects]]
from = "/index.html"
to = "/"
status = 301

[[redirects]]
from = "/exercises/exercises.html"
to = "/exercises"
status = 301

[[redirects]]
from = "/blog/blog.html"
to = "/blog"
status = 301

[[redirects]]
from = "/compare/compare.html"
to = "/compare"
status = 301

[[redirects]]
from = "/dashboard/dashboard.html"
to = "/dashboard"
status = 301

[[redirects]]
from = "/profile/profile.html"
to = "/profile"
status = 301

[[headers]]
for = "/locales/*"
[headers.values]
Content-Type = "application/json; charset=utf-8"
Cache-Control = "public, max-age=86400"
Access-Control-Allow-Origin = "*"

[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
Referrer-Policy = "strict-origin-when-cross-origin"

[dev]
command = "echo 'Static site - open index.html directly'"
port = 8888