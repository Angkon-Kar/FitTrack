<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sign In — FitTrack</title>
  <link rel="icon" type="image/png" href="../assets/images/fitness.png">
  <link rel="stylesheet" href="../shared/global.css">
  <link rel="stylesheet" href="auth.css">
  <script src="../config.local.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- reCAPTCHA v3 -->
  <script src="https://www.google.com/recaptcha/api.js?render=6Ldp540sAAAAAFDs-Ul_yIIQFHmfx5pukzbBLgWK"></script>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <a href="../" class="auth-logo">FIT<span class="dot">.</span>TRACK</a>
    <h1 class="auth-heading">Welcome back 👋</h1>
    <p class="auth-sub">Sign in to track your gains</p>

    <div id="alertEl" class="alert alert-error"></div>

    <button class="btn-google" id="googleBtn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
      Continue with Google
    </button>

    <div class="divider">or</div>

    <form id="loginForm">
    <div class="form-group">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
        <label class="form-label" style="margin:0">Password</label>
        <a href="forgot-password.html" style="font-size:12px;color:var(--text-3);text-decoration:none;transition:.15s"
          onmouseover="this.style.color='var(--lime)'" onmouseout="this.style.color='var(--text-3)'">
          Forgot password?
        </a>
      </div>
      <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="input-eye-btn" id="pwEye" tabindex="-1">
            <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <!-- reCAPTCHA notice -->
      <p style="font-size:11px;color:var(--text-4);margin-bottom:12px;line-height:1.5">
        Protected by reCAPTCHA —
        <a href="https://policies.google.com/privacy" target="_blank" style="color:var(--text-3)">Privacy</a> &
        <a href="https://policies.google.com/terms" target="_blank" style="color:var(--text-3)">Terms</a>
      </p>

      <button type="submit" id="submitBtn" class="btn btn-lime btn-full">Sign In</button>
    </form>

    <div class="auth-footer" style="margin-top:14px">
      New here? <a href="signup.html">Create free account</a>
    </div>
  </div>
</div>

<script type="module">
  import { sb } from '../shared/db.js';
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const app  = initializeApp(CONFIG.firebase);
  const auth = getAuth(app);
  const gp   = new GoogleAuthProvider();
  const RECAPTCHA_KEY = '6Ldp540sAAAAAFDs-Ul_yIIQFHmfx5pukzbBLgWK';

  onAuthStateChanged(auth, u => { if (u) window.location.href = '../dashboard/'; });

  const FIREBASE_ERRORS = {
    'auth/invalid-credential':     'Incorrect email or password.',
    'auth/user-not-found':         'No account found with this email. <a href="signup.html" style="color:var(--lime);font-weight:700">Create one →</a>',
    'auth/wrong-password':         'Incorrect password. Please try again.',
    'auth/too-many-requests':      'Too many failed attempts. Please wait and try again.',
    'auth/user-disabled':          'This account has been disabled.',
    'auth/network-request-failed': 'Network error. Check your connection.',
  };

  function showErr(msg, isHtml = false) {
    const el = document.getElementById('alertEl');
    if (isHtml) el.innerHTML = msg;
    else el.textContent = msg;
    el.className = 'alert alert-error show';
  }

  // ── Password eye ─────────────────────────────────────────
  document.getElementById('pwEye').addEventListener('click', function() {
    const inp  = document.getElementById('password');
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    document.getElementById('eyeOpen').style.display   = show ? 'none' : '';
    document.getElementById('eyeClosed').style.display = show ? ''     : 'none';
  });

  // ── reCAPTCHA helper ─────────────────────────────────────
  async function getRecaptchaToken(action) {
    return new Promise((resolve) => {
      if (typeof grecaptcha === 'undefined') { resolve(null); return; }
      grecaptcha.ready(() => {
        grecaptcha.execute(RECAPTCHA_KEY, { action })
          .then(resolve).catch(() => resolve(null));
      });
    });
  }

  // ── Submit ───────────────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submitBtn');

    btn.textContent = 'Verifying…'; btn.disabled = true;
    document.getElementById('alertEl').classList.remove('show');

    // reCAPTCHA
    await getRecaptchaToken('login');

    // Check if email uses Google only
    try {
      const methods = await fetchSignInMethodsForEmail(auth, email);
      if (methods.length > 0 && !methods.includes('password') && methods.includes('google.com')) {
        showErr(
          'This email uses Google sign-in. <button onclick="document.getElementById(\'googleBtn\').click()" style="background:none;border:none;color:var(--lime);font-weight:700;cursor:pointer;font-size:inherit;padding:0">Sign in with Google →</button>',
          true
        );
        btn.textContent = 'Sign In'; btn.disabled = false;
        return;
      }
    } catch {}

    btn.textContent = 'Signing in…';

    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch(err) {
      const msg = FIREBASE_ERRORS[err.code] || 'Sign in failed. Please try again.';
      showErr(msg, msg.includes('<'));
      btn.textContent = 'Sign In'; btn.disabled = false;
    }
  });

  // ── Google ───────────────────────────────────────────────
  document.getElementById('googleBtn').addEventListener('click', async () => {
    try {
      const result = await signInWithPopup(auth, gp);
      const { data } = await sb.from('users').select('id').eq('firebase_uid', result.user.uid).maybeSingle();
      if (!data) {
        await sb.from('users').insert({
          firebase_uid: result.user.uid,
          name: result.user.displayName || '',
          email: result.user.email || '',
          profile_picture: result.user.photoURL || '',
          username: null, username_set: false
        });
      }
      window.location.href = '../dashboard/';
    } catch { showErr('Google sign-in failed. Please try again.'); }
  });
</script>
<script type="module" src="../shared/navbar.js"></script>
</body>
</html>
