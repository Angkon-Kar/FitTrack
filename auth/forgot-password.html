<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Forgot Password — FitTrack</title>
  <link rel="icon" type="image/png" href="../assets/images/fitness.png">
  <link rel="stylesheet" href="../shared/global.css">
  <link rel="stylesheet" href="auth.css">
  <script src="../config.local.js"></script>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">

    <a href="../index.html" class="auth-logo">FIT<span class="dot">.</span>TRACK</a>

    <!-- Step 1: Enter email -->
    <div id="step1">
      <h1 class="auth-heading">Forgot Password 🔑</h1>
      <p class="auth-sub">Enter your email and we'll send you a reset link.</p>

      <div id="alertEl" class="alert alert-error"></div>
      <div id="successEl" class="alert alert-success"></div>

      <form id="resetForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="email" class="form-input"
            placeholder="you@example.com" required autocomplete="email">
        </div>

        <button type="submit" id="submitBtn" class="btn btn-lime btn-full">
          Send Reset Link
        </button>
      </form>

      <div class="auth-footer" style="margin-top:18px">
        <a href="login.html" style="color:var(--text-3);font-size:13px">
          ← Back to Sign In
        </a>
      </div>
    </div>

    <!-- Step 2: Sent confirmation -->
    <div id="step2" style="display:none;text-align:center">
      <div style="font-size:64px;margin-bottom:16px">📬</div>
      <h2 style="font-family:var(--font-display);font-size:28px;font-weight:900;margin-bottom:8px">
        Check your inbox!
      </h2>
      <p style="color:var(--text-2);font-size:15px;line-height:1.6;margin-bottom:24px">
        We sent a password reset link to<br>
        <strong id="sentEmail" style="color:var(--text-1)"></strong>
      </p>
      <p style="font-size:13px;color:var(--text-3);margin-bottom:24px">
        Didn't receive it? Check spam or
        <button onclick="resendEmail()" class="btn btn-ghost btn-sm" style="display:inline-flex">Resend</button>
      </p>
      <a href="login.html" class="btn btn-outline btn-full">← Back to Sign In</a>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, sendPasswordResetEmail, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const app  = initializeApp(CONFIG.firebase);
  const auth = getAuth(app);
  let lastEmail = '';

  const FIREBASE_ERRORS = {
    'auth/user-not-found':         'No account found with this email address.',
    'auth/invalid-email':          'Please enter a valid email address.',
    'auth/too-many-requests':      'Too many attempts. Please wait a few minutes.',
    'auth/network-request-failed': 'Network error. Check your connection.',
  };

  function showErr(msg) {
    const el = document.getElementById('alertEl');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('successEl').classList.remove('show');
  }

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const btn   = document.getElementById('submitBtn');

    document.getElementById('alertEl').classList.remove('show');
    btn.textContent = 'Sending…'; btn.disabled = true;

    try {
      // Check if email uses Google only (no password provider)
      const methods = await fetchSignInMethodsForEmail(auth, email);
      if (methods.length > 0 && !methods.includes('password') && methods.includes('google.com')) {
        showErr('This email uses Google sign-in. Password reset is managed by Google.');
        btn.textContent = 'Send Reset Link'; btn.disabled = false;
        return;
      }

      await sendPasswordResetEmail(auth, email, {
        url: window.location.origin + '/auth/login.html',
        handleCodeInApp: false,
      });

      // Show success state
      lastEmail = email;
      document.getElementById('sentEmail').textContent = email;
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';

    } catch(err) {
      const msg = FIREBASE_ERRORS[err.code] || 'Failed to send reset email. Please try again.';
      showErr(msg);
      btn.textContent = 'Send Reset Link'; btn.disabled = false;
    }
  });

  window.resendEmail = async function() {
    if (!lastEmail) return;
    try {
      await sendPasswordResetEmail(auth, lastEmail, {
        url: window.location.origin + '/auth/login.html',
      });
      const p = document.querySelector('#step2 p:last-of-type');
      if (p) p.innerHTML = '<span style="color:var(--lime)">✓ Resent successfully!</span>';
    } catch {}
  };
</script>
<script type="module" src="../shared/navbar.js"></script>
</body>
</html>
