<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sign Up — FitTrack</title>
  <link rel="icon" type="image/png" href="../assets/images/fitness.png">
  <link rel="stylesheet" href="../shared/global.css">
  <link rel="stylesheet" href="auth.css">
  <script src="../config.local.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- reCAPTCHA v3 -->
  <script src="https://www.google.com/recaptcha/api.js?render=6Ldp540sAAAAAFDs-Ul_yIIQFHmfx5pukzbBLgWK"></script>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <a href="../index.html" class="auth-logo">FIT<span class="dot">.</span>TRACK</a>
    <h1 class="auth-heading">Create account ⚡</h1>
    <p class="auth-sub">Free forever. Start tracking today.</p>

    <div id="alertEl" class="alert alert-error"></div>

    <button class="btn-google" id="googleBtn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
      Continue with Google
    </button>

    <div class="divider">or sign up with email</div>

    <form id="signupForm">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="name" class="form-input" placeholder="Your Name" required autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-icon-wrap">
          <input type="text" id="username" class="form-input" placeholder="coolathlete99"
            required minlength="3" maxlength="20" autocomplete="username"
            pattern="[a-zA-Z0-9_]+" inputmode="text" autocorrect="off" autocapitalize="none">
          <span class="input-status-icon" id="usernameIcon"></span>
        </div>
        <p class="form-hint">3–20 chars. Letters, numbers, underscores only.</p>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
          <button type="button" class="input-eye-btn" id="pwEye" tabindex="-1">
            <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <!-- reCAPTCHA badge -->
      <p style="font-size:11px;color:var(--text-4);margin-bottom:12px;line-height:1.5">
        Protected by reCAPTCHA —
        <a href="https://policies.google.com/privacy" target="_blank" style="color:var(--text-3)">Privacy</a> &
        <a href="https://policies.google.com/terms" target="_blank" style="color:var(--text-3)">Terms</a>
      </p>

      <button type="submit" id="submitBtn" class="btn btn-lime btn-full">Create Account</button>
    </form>
    <div class="auth-footer">Already have an account? <a href="login.html">Sign In</a></div>
  </div>
</div>

<script type="module">
  import { sb } from '../shared/db.js';
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, updateProfile, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const app  = initializeApp(CONFIG.firebase);
  const auth = getAuth(app);
  const gp   = new GoogleAuthProvider();
  const RECAPTCHA_KEY = '6Ldp540sAAAAAFDs-Ul_yIIQFHmfx5pukzbBLgWK';

  onAuthStateChanged(auth, u => { if (u) window.location.href = '../dashboard/dashboard.html'; });

  // ── Error messages ───────────────────────────────────────
  const FIREBASE_ERRORS = {
    'auth/email-already-in-use':
      'This email is already registered. <a href="login.html" style="color:var(--lime);font-weight:700">Sign in instead →</a>',
    'auth/weak-password':
      'Password is too weak. Use at least 6 characters.',
    'auth/invalid-email':
      'Please enter a valid email address.',
    'auth/too-many-requests':
      'Too many attempts. Please wait a moment and try again.',
    'auth/network-request-failed':
      'Network error. Check your connection and try again.',
  };

  function showErr(msg, isHtml = false) {
    const el = document.getElementById('alertEl');
    if (isHtml) el.innerHTML = msg;
    else el.textContent = msg;
    el.className = 'alert alert-error show';
  }

  function getErrMsg(err) {
    return FIREBASE_ERRORS[err.code] || err.message.replace('Firebase: ','').replace(/\(auth.*\)\.?/,'').trim();
  }

  // ── Username live check ──────────────────────────────────
  const SVG_OK  = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c6ff00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  const SVG_ERR = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff4d6d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  const SVG_SPIN = `<span class="spin-dot"></span>`;

  let checkTimer, usernameValid = false;
  const uInput = document.getElementById('username');
  const iconEl = document.getElementById('usernameIcon');

  function setIcon(state) {
    iconEl.className = 'input-status-icon';
    if      (state==='ok')    { iconEl.classList.add('icon-ok');    iconEl.innerHTML=SVG_OK;   usernameValid=true; }
    else if (state==='error') { iconEl.classList.add('icon-error'); iconEl.innerHTML=SVG_ERR;  usernameValid=false; }
    else if (state==='spin')  {                                      iconEl.innerHTML=SVG_SPIN; usernameValid=false; }
    else                      {                                      iconEl.innerHTML='';        usernameValid=false; }
  }

  uInput.addEventListener('input', () => {
    clearTimeout(checkTimer);
    const v = uInput.value.trim().toLowerCase();
    if (!v) { setIcon(''); return; }
    if (v.length < 3 || !/^[a-z0-9_]+$/.test(v)) { setIcon('error'); return; }
    setIcon('spin');
    checkTimer = setTimeout(async () => {
      const { data } = await sb.from('users').select('id').eq('username', v).maybeSingle();
      setIcon(data ? 'error' : 'ok');
    }, 600);
  });

  // ── Password eye ─────────────────────────────────────────
  document.getElementById('pwEye').addEventListener('click', function() {
    const inp = document.getElementById('password');
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    document.getElementById('eyeOpen').style.display   = show ? 'none' : '';
    document.getElementById('eyeClosed').style.display = show ? ''     : 'none';
  });

  // ── reCAPTCHA helper ─────────────────────────────────────
  async function getRecaptchaToken(action) {
    return new Promise((resolve) => {
      if (typeof grecaptcha === 'undefined') { resolve(null); return; }
      grecaptcha.ready(() => {
        grecaptcha.execute(RECAPTCHA_KEY, { action })
          .then(resolve)
          .catch(() => resolve(null));
      });
    });
  }

  // ── Submit ───────────────────────────────────────────────
  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name     = document.getElementById('name').value.trim();
    const username = uInput.value.trim().toLowerCase();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submitBtn');

    if (!usernameValid) { showErr('Please choose an available username.'); return; }

    btn.textContent = 'Verifying…'; btn.disabled = true;
    document.getElementById('alertEl').classList.remove('show');

    // reCAPTCHA
    await getRecaptchaToken('signup');

    // Check if email already used (better UX before Firebase error)
    try {
      const methods = await fetchSignInMethodsForEmail(auth, email);
      if (methods.length > 0) {
        const isGoogle = methods.includes('google.com');
        showErr(
          isGoogle
            ? 'This email is linked to a Google account. <a href="login.html" style="color:var(--lime);font-weight:700">Sign in with Google →</a>'
            : 'This email is already registered. <a href="login.html" style="color:var(--lime);font-weight:700">Sign in instead →</a>',
          true
        );
        btn.textContent = 'Create Account'; btn.disabled = false;
        return;
      }
    } catch {}

    btn.textContent = 'Creating account…';

    try {
      const { data: ex } = await sb.from('users').select('id').eq('username', username).maybeSingle();
      if (ex) { showErr('Username just got taken. Choose another.'); btn.textContent='Create Account'; btn.disabled=false; return; }

      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      await sb.from('users').insert({
        firebase_uid: cred.user.uid, name, username,
        email, username_set: true, profile_picture: ''
      });
      window.location.href = '../dashboard/dashboard.html';
    } catch(err) {
      const msg = getErrMsg(err);
      const isHtml = msg.includes('<a');
      showErr(msg, isHtml);
      btn.textContent = 'Create Account'; btn.disabled = false;
    }
  });

  // ── Google ───────────────────────────────────────────────
  document.getElementById('googleBtn').addEventListener('click', async () => {
    try {
      const result = await signInWithPopup(auth, gp);
      const { data } = await sb.from('users').select('id').eq('firebase_uid', result.user.uid).maybeSingle();
      if (!data) {
        await sb.from('users').insert({
          firebase_uid: result.user.uid,
          name: result.user.displayName || '',
          email: result.user.email || '',
          profile_picture: result.user.photoURL || '',
          username: null, username_set: false
        });
      }
      window.location.href = '../dashboard/dashboard.html';
    } catch { showErr('Google sign-in failed. Please try again.'); }
  });
</script>
<script type="module" src="../shared/navbar.js"></script>
</body>
</html>
