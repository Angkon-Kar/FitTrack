<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Leaderboard — FitTrack</title>
  <link rel="icon" type="image/png" href="../assets/images/fitness.png">
  <link rel="stylesheet" href="../shared/global.css">
  <link rel="stylesheet" href="leaderboard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../config.local.js"></script>
</head>
<body>
<div class="lb-page">
  <div class="wrap">

    <!-- Hero -->
    <div class="lb-hero">
      <div class="section-eyebrow">Community Rankings</div>
      <h1>LEADER<br><span>BOARD</span></h1>
      <p>Who's putting in the most work? See where you stand.</p>
    </div>

    <!-- My rank -->
    <div class="my-rank-pill" id="myRankPill" style="display:none">
      <span style="font-size:20px">👤</span>
      <div>
        <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px">Your Rank</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="my-rank-num" id="myRankNum">#—</span>
          <span style="font-size:13px;color:var(--text-2)" id="myRankScore">0 reps</span>
          <span class="league-badge" id="myLeagueBadge"></span>
        </div>
      </div>
      <div style="margin-left:auto">
        <a href="compare.html" class="btn btn-outline btn-sm">⚔️ Challenge</a>
      </div>
    </div>

    <!-- Filters -->
    <div class="lb-filters">
      <!-- Category -->
      <div class="lb-filter-group">
        <button class="lb-filter-btn cat-reps active" data-cat="reps"   onclick="setFilter('cat','reps',this)">💪 Reps</button>
        <button class="lb-filter-btn cat-km"          data-cat="km"     onclick="setFilter('cat','km',this)">🏃 Distance</button>
        <button class="lb-filter-btn cat-streak"      data-cat="streak" onclick="setFilter('cat','streak',this)">🔥 Streak</button>
        <button class="lb-filter-btn cat-score"       data-cat="score"  onclick="setFilter('cat','score',this)">⭐ Score</button>
      </div>
      <!-- Time -->
      <div class="lb-filter-group">
        <button class="lb-filter-btn time-week"  data-time="week"  onclick="setFilter('time','week',this)">Week</button>
        <button class="lb-filter-btn time-month" data-time="month" onclick="setFilter('time','month',this)">Month</button>
        <button class="lb-filter-btn time-all active" data-time="all" onclick="setFilter('time','all',this)">All Time</button>
      </div>
    </div>

    <!-- Podium (top 3) -->
    <div class="lb-podium" id="podium" style="display:none"></div>

    <!-- Full list -->
    <div class="lb-list" id="lbList">
      <div class="lb-loading"><div class="spinner" style="display:inline-block;margin-right:8px"></div> Loading rankings…</div>
    </div>

    <!-- CTA -->
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:20px">
      <a href="../dashboard/log.html"  class="btn btn-lime">✏️ Log Workout</a>
      <a href="compare.html"           class="btn btn-outline">⚔️ Compare Athletes</a>
      <a href="../dashboard/dashboard.html" class="btn btn-ghost">📊 My Dashboard</a>
    </div>

  </div>
</div>

<script type="module">
  import { sb } from '../shared/db.js';
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const auth = getAuth(initializeApp(CONFIG.firebase));
  let currentUID = null;
  let currentCat  = 'reps';
  let currentTime = 'all';
  let allScores   = [];
  let myScore     = null;

  // ── League system ──────────────────────────────────────
  function getLeague(rank, total) {
    if (rank === 1)        return { label:'👑 #1',      cls:'league-elite'   };
    if (rank <= 3)         return { label:'🥇 Gold',    cls:'league-gold'    };
    if (rank <= 10)        return { label:'💎 Diamond', cls:'league-diamond' };
    if (rank <= 25)        return { label:'🥈 Silver',  cls:'league-silver'  };
    if (rank <= 50)        return { label:'🥉 Bronze',  cls:'league-bronze'  };
    return                        { label:'🏋️ Athlete',  cls:''               };
  }

  // ── Column definitions ─────────────────────────────────
  const CAT_CONFIG = {
    reps:   { col:'total_reps',   wkCol:'weekly_reps',  moCol:'monthly_reps', label:'Reps',     unit:'',   icon:'💪' },
    km:     { col:'total_km',     wkCol:'weekly_km',    moCol:'monthly_km',   label:'km',       unit:'km', icon:'🏃' },
    streak: { col:'streak_days',  wkCol:'streak_days',  moCol:'streak_days',  label:'day streak',unit:'d', icon:'🔥' },
    score:  { col:'total_score',  wkCol:'total_score',  moCol:'total_score',  label:'Score',    unit:'',   icon:'⭐' },
  };

  // ── Auth ───────────────────────────────────────────────
  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = '../auth/login.html'; return; }
    currentUID = user.uid;

    // Update leaderboard score from fresh workout data
    await refreshMyScore(user.uid);

    // Load leaderboard
    await loadLeaderboard();
  });

  // ── Refresh own score in leaderboard_scores table ──────
  async function refreshMyScore(uid) {
    const [profileRes, logsRes, actRes] = await Promise.all([
      sb.from('users').select('username,name,profile_picture').eq('firebase_uid', uid).maybeSingle(),
      sb.from('workout_logs').select('*').eq('firebase_uid', uid),
      sb.from('activity_logs').select('*').eq('firebase_uid', uid).catch(() => ({ data: [] })),
    ]);

    const profile = profileRes.data;
    const logs    = logsRes.data || [];
    const acts    = actRes.data  || [];

    if (!profile?.username) return; // can't rank without username

    // Calculate totals
    const PUSH_EX  = ['push-up','diamond-push-up','incline-push-up','decline-push-up','pike-push-up','dips','hspu','planche'];
    const PULL_EX  = ['pull-up','chin-up','bodyweight-row','muscle-up','front-lever'];
    const LEGS_EX  = ['squat','lunges','bulgarian-split-squat','calf-raises','glute-bridge','pistol-squat','jump-squats'];
    const CORE_EX  = ['plank','sit-ups','crunches','russian-twist','hanging-leg-raises','bicycle-crunch','l-sit'];
    const CARDIO_EX= ['burpees','jumping-jacks','high-knees','mountain-climbers'];

    let push=0,pull=0,legs=0,core=0,cardio=0,total=0;
    logs.forEach(l => {
      for (const [k,v] of Object.entries(l.exercises||{})) {
        total+=v;
        if(PUSH_EX.includes(k))push+=v; else if(PULL_EX.includes(k))pull+=v;
        else if(LEGS_EX.includes(k))legs+=v; else if(CORE_EX.includes(k))core+=v;
        else if(CARDIO_EX.includes(k))cardio+=v;
      }
    });

    const now = new Date();
    const weekAgo  = new Date(now - 7*864e5);
    const monthAgo = new Date(now - 30*864e5);
    const wkReps   = logs.filter(l=>new Date(l.log_date+'T00:00:00')>=weekAgo).reduce((s,l)=>s+Object.values(l.exercises||{}).reduce((a,b)=>a+b,0),0);
    const moReps   = logs.filter(l=>new Date(l.log_date+'T00:00:00')>=monthAgo).reduce((s,l)=>s+Object.values(l.exercises||{}).reduce((a,b)=>a+b,0),0);

    const totalKm = acts.reduce((s,a)=>s+(+a.distance_km||0),0);
    const wkKm    = acts.filter(a=>new Date(a.log_date+'T00:00:00')>=weekAgo).reduce((s,a)=>s+(+a.distance_km||0),0);
    const moKm    = acts.filter(a=>new Date(a.log_date+'T00:00:00')>=monthAgo).reduce((s,a)=>s+(+a.distance_km||0),0);
    const steps   = acts.reduce((s,a)=>s+(+a.steps||0),0);
    const cals    = acts.reduce((s,a)=>s+(+a.calories||0),0);

    // Streak
    function calcStreak(logs) {
      if(!logs?.length)return 0;
      const sorted=[...logs].sort((a,b)=>new Date(b.log_date)-new Date(a.log_date));
      const today=new Date();today.setHours(0,0,0,0);
      const first=new Date(sorted[0].log_date+'T00:00:00');
      if(Math.round((today-first)/864e5)>1)return 0;
      let streak=1,prev=first;
      for(let i=1;i<sorted.length;i++){const cur=new Date(sorted[i].log_date+'T00:00:00');if(Math.round((prev-cur)/864e5)===1){streak++;prev=cur;}else break;}
      return streak;
    }

    await sb.from('leaderboard_scores').upsert({
      firebase_uid:   uid,
      username:       profile.username,
      display_name:   profile.name || profile.username,
      profile_pic:    profile.profile_picture || '',
      total_reps:     total,
      push_reps:      push,
      pull_reps:      pull,
      legs_reps:      legs,
      core_reps:      core,
      cardio_reps:    cardio,
      total_km:       totalKm,
      total_steps:    steps,
      total_calories: cals,
      streak_days:    calcStreak(logs),
      workout_days:   new Set(logs.map(l=>l.log_date)).size,
      weekly_reps:    wkReps,
      weekly_km:      wkKm,
      monthly_reps:   moReps,
      monthly_km:     moKm,
      updated_at:     new Date().toISOString(),
    }, { onConflict: 'firebase_uid' });
  }

  // ── Load leaderboard ───────────────────────────────────
  async function loadLeaderboard() {
    document.getElementById('lbList').innerHTML = '<div class="lb-loading"><div class="spinner" style="display:inline-block;margin-right:8px"></div> Loading rankings…</div>';
    document.getElementById('podium').style.display = 'none';

    const cfg = CAT_CONFIG[currentCat];
    const sortCol = currentTime === 'week' ? cfg.wkCol : currentTime === 'month' ? cfg.moCol : cfg.col;

    const { data, error } = await sb
      .from('leaderboard_scores')
      .select('*')
      .order(sortCol, { ascending: false })
      .limit(100);

    if (error || !data) {
      document.getElementById('lbList').innerHTML = '<div class="lb-empty"><div class="lb-empty-icon">⚠️</div><p>Failed to load leaderboard. Make sure <code>supabase-setup-v4.sql</code> is run.</p></div>';
      return;
    }

    allScores = data;

    // Find my position
    const myIdx = allScores.findIndex(s => s.firebase_uid === currentUID);
    if (myIdx >= 0) {
      myScore = allScores[myIdx];
      const myRank = myIdx + 1;
      const league = getLeague(myRank, allScores.length);
      const scoreVal = parseFloat(myScore[sortCol] || 0);
      document.getElementById('myRankNum').textContent   = '#' + myRank;
      document.getElementById('myRankScore').textContent = scoreVal.toLocaleString() + (cfg.unit ? ' '+cfg.unit : ' '+cfg.label.toLowerCase());
      document.getElementById('myLeagueBadge').textContent  = league.label;
      document.getElementById('myLeagueBadge').className    = 'league-badge ' + league.cls;
      document.getElementById('myRankPill').style.display   = 'flex';
    }

    renderPodium(allScores.slice(0,3), sortCol, cfg);
    renderList(allScores, sortCol, cfg);
  }

  // ── Podium ─────────────────────────────────────────────
  function renderPodium(top3, sortCol, cfg) {
    if (!top3.length) return;
    const medals = ['🥇','🥈','🥉'];
    const colors = ['linear-gradient(135deg,rgba(255,167,38,.8),rgba(255,200,0,.6))',
                    'linear-gradient(135deg,#9494b8,#c0c0c0)',
                    'linear-gradient(135deg,#8b4513,#cd7f32)'];

    const el = document.getElementById('podium');
    el.style.display = 'grid';
    el.innerHTML = top3.map((s,i) => {
      const rank = i+1;
      const score = parseFloat(s[sortCol]||0);
      const av = s.profile_pic
        ? `<img src="${s.profile_pic}" alt="${s.display_name}">`
        : (s.display_name||'?')[0].toUpperCase();
      const isMe = s.firebase_uid === currentUID;
      return `
        <div class="podium-card rank-${rank}${isMe?' is-me':''}">
          ${rank===1?'<div class="podium-crown">👑</div>':''}
          <div class="podium-medal">${medals[i]}</div>
          <div class="podium-avatar" style="background:${colors[i]}">${typeof av==='string'&&av.startsWith('<')?av:`<img onerror="this.parentNode.textContent='${(s.display_name||'?')[0]}'" src="${s.profile_pic}">`||av}</div>
          <div class="podium-name">${s.display_name||s.username}${isMe?' <span style="color:var(--lime);font-size:11px">(You)</span>':''}</div>
          <div class="podium-handle">@${s.username}</div>
          <div class="podium-score" style="color:${rank===1?'var(--amber)':rank===2?'#c0c0c0':'#cd7f32'}">${score.toLocaleString()}</div>
          <div class="podium-score-sub">${cfg.label}</div>
        </div>`;
    }).join('');

    // Fix avatar rendering
    el.querySelectorAll('.podium-avatar').forEach((av,i) => {
      const s = top3[i];
      if (s.profile_pic) {
        av.innerHTML = `<img src="${s.profile_pic}" alt="" onerror="this.parentNode.textContent='${(s.display_name||'?')[0].toUpperCase()}'">`;
      } else {
        av.textContent = (s.display_name||s.username||'?')[0].toUpperCase();
      }
    });
  }

  // ── List ───────────────────────────────────────────────
  function renderList(scores, sortCol, cfg) {
    if (!scores.length) {
      document.getElementById('lbList').innerHTML = '<div class="lb-empty"><div class="lb-empty-icon">🏆</div><h3>No rankings yet</h3><p>Be the first to log a workout!</p></div>';
      return;
    }

    let html = `
      <div class="lb-list-header">
        <span>#</span>
        <span>Athlete</span>
        <span style="text-align:right">${cfg.icon} ${cfg.label}</span>
        <span style="text-align:right">🔥 Streak</span>
      </div>`;

    scores.forEach((s, i) => {
      const rank  = i + 1;
      const score = parseFloat(s[sortCol]||0);
      const isMe  = s.firebase_uid === currentUID;
      const league = getLeague(rank, scores.length);
      const rankCls = rank<=3 ? `r${rank}` : '';
      const avStyle = 'background:' + (rank<=3 ? ['linear-gradient(135deg,rgba(255,167,38,.8),#ffc800)','linear-gradient(135deg,#9494b8,#c0c0c0)','linear-gradient(135deg,#8b4513,#cd7f32)'][rank-1] : 'var(--bg-4)');

      html += `
        <div class="lb-row${isMe?' is-me':''}${rank<=3?' rank-top3':''}">
          <div class="lb-rank ${rankCls}">${rank<=3?['🥇','🥈','🥉'][rank-1]:rank}</div>
          <div class="lb-athlete">
            <div class="lb-avatar" style="${avStyle}" id="lbav-${i}">
              ${s.profile_pic?`<img src="${s.profile_pic}" alt="" onerror="this.style.display='none';this.parentNode.insertAdjacentText('beforeend','${(s.display_name||'?')[0].toUpperCase()}')">`:( s.display_name||s.username||'?')[0].toUpperCase()}
            </div>
            <div>
              <div class="lb-name">${s.display_name||s.username}${isMe?'<span class="lb-you-badge">You</span>':''}</div>
              <div style="display:flex;align-items:center;gap:6px">
                <span class="lb-handle">@${s.username}</span>
                ${league.cls?`<span class="league-badge ${league.cls}">${league.label}</span>`:''}
              </div>
            </div>
          </div>
          <div class="lb-score" style="color:${rank===1?'var(--amber)':rank<=3?'#c0c0c0':'var(--text-1)'}">${score.toLocaleString()}${cfg.unit?' '+cfg.unit:''}</div>
          <div class="lb-streak">${s.streak_days>0?`<span>🔥 ${s.streak_days}d</span>`:'—'}</div>
        </div>`;
    });

    document.getElementById('lbList').innerHTML = html;
  }

  // ── Filters ────────────────────────────────────────────
  window.setFilter = function(type, val, btn) {
    if (type === 'cat') {
      currentCat = val;
      document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
    } else {
      currentTime = val;
      document.querySelectorAll('[data-time]').forEach(b => b.classList.remove('active'));
    }
    btn.classList.add('active');
    loadLeaderboard();
  };
</script>
<script type="module" src="../shared/navbar.js"></script>
</body>
</html>
